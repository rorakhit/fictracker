<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1318;
      color: #e8e6e3;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
    }
    .header h1 span:first-child { color: #14b8a6; }
    .header h1 span:last-child { color: #e8e6e3; }

    .login-form { display: flex; flex-direction: column; gap: 10px; }
    .login-form input {
      background: #1a1f26;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 12px;
      color: #e8e6e3;
      font-size: 13px;
      outline: none;
    }
    .login-form input:focus { border-color: #14b8a6; }
    .login-form input::placeholder { color: #666; }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-accent { background: #14b8a6; color: white; }
    .btn-ghost {
      background: transparent;
      color: #999;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    .or-divider {
      text-align: center;
      color: #666;
      font-size: 12px;
      margin: 4px 0;
    }

    .user-info {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .user-email {
      font-size: 13px;
      color: #999;
    }
    .user-email strong { color: #e8e6e3; }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .stat-card {
      background: #1a1f26;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 10px 8px;
      text-align: center;
    }
    .stat-num {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.1;
    }
    .stat-label {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }

    .msg {
      font-size: 12px;
      padding: 8px;
      border-radius: 6px;
      margin-top: 4px;
    }
    .msg-error { background: rgba(239,68,68,0.1); color: #ef4444; }
    .msg-success { background: rgba(20,184,166,0.1); color: #14b8a6; }

    .open-app {
      display: block;
      text-align: center;
      color: #14b8a6;
      font-size: 12px;
      text-decoration: none;
      margin-top: 8px;
    }
    .open-app:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>Fic</span><span>Tracker</span></h1>
  </div>

  <div id="loading">Loading...</div>
  <div id="login-view" style="display:none">
    <div class="login-form">
      <input type="email" id="email" placeholder="Email address" autocomplete="email">
      <input type="password" id="password" placeholder="Password" autocomplete="current-password">
      <button class="btn btn-accent" id="sign-in-btn">Sign In</button>
      <div class="or-divider">or</div>
      <button class="btn btn-ghost" id="magic-link-btn">Send Magic Link</button>
      <div id="login-msg" style="display:none"></div>
    </div>
  </div>

  <div id="user-view" style="display:none">
    <div class="user-info">
      <div class="user-email">Signed in as <strong id="user-email-text"></strong></div>
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" id="stat-total" style="color:#14b8a6">—</div>
          <div class="stat-label">Fics</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-reading" style="color:#f59e0b">—</div>
          <div class="stat-label">Reading</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-wips" style="color:#14b8a6">—</div>
          <div class="stat-label">WIPs</div>
        </div>
      </div>
      <div class="actions">
        <a href="https://fictracker.app" target="_blank" class="btn btn-accent" style="text-align:center;text-decoration:none;color:white">Open FicTracker</a>
        <button class="btn btn-ghost btn-sm" id="sign-out-btn">Sign Out</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
